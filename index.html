<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>drsoundpro</title>
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background-color: #0d1b2a;
  color: white;
}
.navbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 1rem;
  background-color: rgba(0, 0, 0, 0.6);
  position: sticky;
  top: 0;
  z-index: 1000;
}
.navbar a {
  color: white;
  margin-left: 1rem;
  text-decoration: none;
  font-weight: bold;
}
.links {
  display: flex;
  gap: 1rem;
}
.hamburger {
  display: none;
  flex-direction: column;
  cursor: pointer;
  z-index: 1001;
}
.hamburger span {
  background: white;
  height: 3px;
  margin: 4px;
  width: 25px;
}
@media (max-width: 768px) {
  .links {
    display: none;
    flex-direction: column;
    background-color: rgba(0,0,0,0.95);
    position: fixed;
    top: 0;
    right: 0;
    height: 100%;
    width: 70%;
    padding-top: 60px;
    padding-left: 1rem;
    border-left: 1px solid #444;
    z-index: 1000;
  }
  .links.active {
    display: flex;
  }
  .links a {
    margin: 1rem 0;
    font-size: 1.2rem;
  }
  .hamburger {
    display: flex;
  }
}
.search-bar {
  margin: 1rem auto;
  display: flex;
  flex-direction: column;
  align-items: center;
  max-width: 400px;
}
.search-bar input {
  width: 100%;
  padding: 0.5rem;
  border-radius: 5px;
  border: none;
  outline: none;
}
.search-results {
  margin-top: 0.5rem;
  background-color: white;
  color: black;
  width: 100%;
  border-radius: 5px;
  padding: 0.5rem;
  display: none;
}
.search-results div {
  padding: 5px;
  cursor: pointer;
}
.search-results div:hover {
  background-color: #ddd;
}
.hero {
  position: relative;
  width: 100%;
  height: 600px;
  background-image: url('sound-mixer.jpg');
  background-size: cover;
  background-position: center;
}
.about {
  max-width: 800px;
  margin: 2rem auto;
  padding: 0 1rem;
  text-align: center;
}
</style>
</head>
<body>
<div class="navbar">
  <div class="logo">
    <img src="logo.png" alt="Logo" style="height:40px;">
  </div>
  <div class="hamburger" id="hamburger">
    <span></span>
    <span></span>
    <span></span>
  </div>
  <div class="links" id="navLinks">
    <a href="equipment.html">Equipment</a>
    <a href="contact.html">Contact Us</a>
    <a href="mailto:drsoundproshow@gmail.com">Email Us</a>
  </div>
</div>

<div class="search-bar">
  <input type="text" placeholder="Search equipment..." id="searchInput">
  <div class="search-results" id="searchResults"></div>
</div>

<div class="hero"></div>

<div class="about">
  <h2>About Our Services</h2>
  <p>Management and execution of music concerts, festivals and events, and the provision of audio equipment for 50 to 2,000 people, including state-of-the-art recording mixers and the provision of state-of-the-art line array speakers.</p>
</div>

<script>
// 🔹 Search functionality
const products = [
  {name: "Mixer", price: "$500/day", link: "mixer.html"},
  {name: "Microphone", price: "$50/day", link: "microphone.html"},
  {name: "Speaker", price: "$100/day", link: "speaker.html"}
];
const searchInput = document.getElementById('searchInput');
const searchResults = document.getElementById('searchResults');

searchInput.addEventListener('input', function() {
  const query = this.value.toLowerCase();
  if (!query) {
    searchResults.style.display = 'none';
    return;
  }
  const results = products.filter(item => item.name.toLowerCase().includes(query));
  if (results.length) {
    searchResults.innerHTML = results.map(r => 
      `<div onclick="window.location.href='${r.link}'">${r.name}: ${r.price}</div>`
    ).join("");
  } else {
    searchResults.innerHTML = "<div>No matching products found.</div>";
  }
  searchResults.style.display = 'block';
});

// 🔹 Hamburger menu toggle
const hamburger = document.getElementById('hamburger');
const navLinks = document.getElementById('navLinks');

hamburger.addEventListener('click', () => {
  navLinks.classList.toggle('active');
});
</script>
</body>
</html>
